# Rules for the PyPI release-readiness example.
#
# Try:
#   cargo run -- check pyastq.example.py --rules pyastq.example.toml
#   cargo run -- test-rules --rules pyastq.example.toml
#   cargo run -- find pyastq.example.py \
#     'class:PackageInspector -> function:LoadPackage -> call:requests.get'
#
# The rules intentionally demonstrate exact matching, import alias resolution,
# descendant chains, argument predicates, negation, regexes, variables, captures,
# and suppressions.
# Each rule has both a caught and a clean counterpart in pyastq.example.py.

variables = { dynamic_eval = "eval", weak_digest = "hashlib.md5" }

[[rules]]
id = "pypi-request-timeout"
# Caught: PackageInspector.LoadPackage; clean: PackageInspector.load_package.
query = "call:requests.get AND NOT argument:timeout:*"
message = "PyPI requests must specify an explicit timeout."
severity = "error"
valid = [
    "import requests as http\nhttp.get(url, timeout=10)",
    "requests.get(url, timeout=(3.05, 30))",
]
invalid = [
    "import requests as http\nhttp.get(url)",
    "requests.get(url)",
]

[[rules]]
id = "legacy-package-loader"
# Caught: LoadPackage; clean: load_package.
query = "class:PackageInspector -> function:LoadPackage -> call:requests.get"
message = "Remove the legacy package loader and use load_package()."
severity = "warning"
valid = [
    "class PackageInspector:\n    def load_package(self):\n        requests.get(url, timeout=10)",
]
invalid = [
    "class PackageInspector:\n    def LoadPackage(self):\n        requests.get(url)",
]

[[rules]]
id = "method-name-case"
# Caught: LoadPackage; clean: load_package.
query = "function:regex:^[A-Z] AND ancestor(class:*)"
message = "Method names must start with a lowercase letter."
severity = "warning"
valid = [
    "class PackageInspector:\n    def load_package(self):\n        pass",
    "def TopLevelFactory():\n    pass",
]
invalid = [
    "class PackageInspector:\n    def LoadPackage(self):\n        pass",
]

[[rules]]
id = "no-shell-release-hooks"
# Caught: run_legacy_hook; clean: run_hook and current_revision.
query = "call:subprocess.run AND argument:shell:True"
message = "Release hooks must use an argument list instead of shell=True."
severity = "error"
valid = [
    'subprocess.run(["git", "status"], check=True)',
]
invalid = [
    "subprocess.run(command, shell=True, check=True)",
]

[[rules]]
id = "no-dynamic-overrides"
# Caught: parse_legacy_overrides; clean: parse_json_overrides.
query = "call:$dynamic_eval"
message = "Parse release overrides as JSON instead of evaluating Python code."
severity = "error"
valid = [
    "json.loads(value)",
]
invalid = [
    "eval(value)",
]

[[rules]]
id = "weak-release-digest"
# Caught: legacy_artifact_id; clean: artifact_sha256.
# suppressed_partner_artifact_id also demonstrates a targeted exception.
query = "call:$weak_digest"
message = "Release artifacts should use SHA-256 or a stronger digest."
severity = "warning"
valid = [
    "hashlib.sha256(data).hexdigest()",
]
invalid = [
    "hashlib.md5(data).hexdigest()",
]

[[rules]]
id = "duplicate-version-comparison"
# Caught: compare_legacy_version; clean: compare_release_version.
# $version is intentionally not defined, so it captures one argument and
# requires the second argument to be the same source value. This demonstrates
# the same undefined variable appearing twice in one query pattern.
query = "call:* AND argument:0:$version AND argument:1:$version"
message = "Version comparisons should not pass the same value twice."
severity = "warning"
valid = [
    "versions_match(current_version, expected_version)",
]
invalid = [
    "versions_match(current_version, current_version)",
]

[[rules]]
id = "git-command-must-check"
# Caught: legacy_revision; clean: current_revision.
query = "call:subprocess.run AND argument:0:contains:git AND NOT argument:check:True"
message = "Git subprocesses must fail when the command exits unsuccessfully."
severity = "error"
valid = [
    'subprocess.run(["git", "status"], check=True)',
]
invalid = [
    'subprocess.run(["git", "status"])',
]
