name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build, for example v0.1.1
        required: true
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_17"
          - os: macos-14
            target: aarch64-apple-darwin
            manylinux: "off"
          - os: macos-14
            target: x86_64-apple-darwin
            manylinux: "off"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          tag="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "::error::Release tag must have the form vMAJOR.MINOR.PATCH"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set package version from tag
        shell: bash
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          manifest = Path("Cargo.toml")
          source = manifest.read_text()
          updated, count = re.subn(
              r'(?m)^(version\s*=\s*)"[^"]+"',
              rf'\1"{os.environ["VERSION"]}"',
              source,
              count=1,
          )
          if count != 1:
              raise SystemExit("could not update package.version in Cargo.toml")
          manifest.write_text(updated)
          PY
          cargo metadata --format-version 1 > /dev/null

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.11.5
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --locked --compatibility pypi --out dist

      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          tag="${DISPATCH_TAG:-$GITHUB_REF_NAME}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}

      - uses: actions/download-artifact@v8
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
        run: gh release create "$TAG" dist/* --verify-tag --generate-notes
